version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vaultkey-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - vaultkey-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vaultkey-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - vaultkey-network

networks:
  vaultkey-network:
    driver: bridge
