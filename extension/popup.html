<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VaultKey</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- 锁定状态界面 -->
  <div id="locked-view" class="view hidden">
    <div class="lock-container">
      <div class="lock-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#00D4AA" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h2 class="lock-title">VaultKey 已锁定</h2>
      <p class="lock-subtitle">输入主密码解锁密码库</p>
      <form id="unlock-form">
        <div class="input-group">
          <input type="password" id="master-password" placeholder="输入主密码" autocomplete="off" autofocus>
          <button type="button" id="toggle-password" class="btn-icon" title="显示/隐藏密码">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <button type="submit" class="btn-primary">解锁</button>
      </form>
      <div id="unlock-error" class="error-msg hidden">主密码错误，请重试</div>
    </div>
  </div>

  <!-- 已解锁状态界面 -->
  <div id="unlocked-view" class="view hidden">
    <!-- 顶部搜索栏 -->
    <div class="header">
      <div class="search-bar">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B7A99" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="搜索密码项..." autocomplete="off">
      </div>
      <button id="btn-lock" class="btn-icon" title="锁定密码库">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </button>
    </div>

    <!-- 快捷操作 -->
    <div class="quick-actions">
      <button id="btn-generate" class="btn-quick" title="生成密码">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>
        </svg>
        <span>生成密码</span>
      </button>
      <button id="btn-add" class="btn-quick" title="添加项目">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span>添加项目</span>
      </button>
    </div>

    <!-- 密码项列表 -->
    <div id="item-list" class="item-list">
      <!-- 动态渲染 -->
    </div>

    <!-- 空状态 -->
    <div id="empty-state" class="empty-state hidden">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#3A4A6B" stroke-width="1.5">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <p>没有找到匹配的密码项</p>
    </div>

    <!-- 生成密码面板 -->
    <div id="generator-panel" class="generator-panel hidden">
      <div class="generator-header">
        <h3>密码生成器</h3>
        <button id="btn-close-generator" class="btn-icon">✕</button>
      </div>
      <div class="generator-output">
        <input type="text" id="generated-password" readonly>
        <button id="btn-copy-password" class="btn-icon" title="复制密码">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
        <button id="btn-regenerate" class="btn-icon" title="重新生成">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>
      <div class="generator-options">
        <label class="option-row">
          <span>长度: <strong id="length-value">16</strong></span>
          <input type="range" id="password-length" min="8" max="64" value="16">
        </label>
        <label class="option-row checkbox-row">
          <input type="checkbox" id="opt-uppercase" checked>
          <span>大写字母 (A-Z)</span>
        </label>
        <label class="option-row checkbox-row">
          <input type="checkbox" id="opt-lowercase" checked>
          <span>小写字母 (a-z)</span>
        </label>
        <label class="option-row checkbox-row">
          <input type="checkbox" id="opt-numbers" checked>
          <span>数字 (0-9)</span>
        </label>
        <label class="option-row checkbox-row">
          <input type="checkbox" id="opt-symbols" checked>
          <span>特殊符号 (!@#$...)</span>
        </label>
      </div>
    </div>
  </div>

  <!-- 底部品牌栏 -->
  <div class="footer">
    <span class="brand">🛡️ VaultKey</span>
    <a href="#" id="btn-open-webapp" class="link">打开 VaultKey</a>
  </div>

  <!-- 提示消息 -->
  <div id="toast" class="toast hidden"></div>

  <script src="popup.js"></script>
</body>
</html>
