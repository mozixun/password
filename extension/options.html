<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VaultKey 设置</title>
  <style>
    :root {
      --bg-primary: #0A1628;
      --bg-secondary: #0F1D32;
      --bg-tertiary: #162240;
      --bg-hover: #1A2B4A;
      --text-primary: #E8EDF5;
      --text-secondary: #8892A8;
      --text-muted: #5A6478;
      --accent: #00D4AA;
      --accent-hover: #00E8BB;
      --accent-dim: rgba(0, 212, 170, 0.15);
      --danger: #FF4757;
      --danger-dim: rgba(255, 71, 87, 0.15);
      --border: #1E2D4A;
      --radius: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .header-icon {
      width: 48px;
      height: 48px;
      background: var(--accent-dim);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
    }

    .header p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title svg {
      color: var(--accent);
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .setting-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .setting-row:first-of-type {
      padding-top: 0;
    }

    .setting-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .setting-label span {
      font-size: 13px;
      font-weight: 500;
    }

    .setting-label small {
      font-size: 11px;
      color: var(--text-muted);
    }

    .setting-control input[type="number"] {
      width: 80px;
      padding: 6px 10px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 13px;
      text-align: center;
      outline: none;
    }

    .setting-control input[type="number"]:focus {
      border-color: var(--accent);
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 24px;
      transition: all 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      bottom: 2px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: all 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(20px);
      background: var(--accent);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--accent);
    }

    .btn-danger {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--danger-dim);
      color: var(--danger);
      border: 1px solid transparent;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-danger:hover {
      background: var(--danger);
      color: #fff;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--bg-tertiary);
      border-radius: 6px;
      font-size: 12px;
      margin-top: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .status-dot.connected {
      background: var(--accent);
      box-shadow: 0 0 6px rgba(0, 212, 170, 0.5);
    }

    .status-dot.disconnected {
      background: var(--danger);
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      background: var(--accent);
      color: var(--bg-primary);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      z-index: 100;
      animation: fadeInUp 0.3s ease;
    }

    .toast.error {
      background: var(--danger);
      color: #fff;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .hidden {
      display: none;
    }

    .version {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <div class="header-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div>
        <h1>VaultKey 设置</h1>
        <p>安全便捷的密码管理器</p>
      </div>
    </div>

    <!-- 连接状态 -->
    <div class="card">
      <div class="card-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        服务器连接
      </div>
      <div class="status-indicator">
        <div id="status-dot" class="status-dot disconnected"></div>
        <span id="status-text">未连接到 VaultKey 服务器</span>
      </div>
      <div class="actions">
        <button id="btn-open-webapp" class="btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          打开 VaultKey 网页端
        </button>
        <button id="btn-check-connection" class="btn-secondary">检查连接</button>
      </div>
    </div>

    <!-- 安全设置 -->
    <div class="card">
      <div class="card-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        安全设置
      </div>
      <div class="setting-row">
        <div class="setting-label">
          <span>自动锁定时间</span>
          <small>无操作后自动锁定密码库</small>
        </div>
        <div class="setting-control">
          <input type="number" id="auto-lock-minutes" min="1" max="120" value="15">
          <span style="font-size:12px;color:var(--text-muted);margin-left:4px">分钟</span>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-label">
          <span>数据同步</span>
          <small>与 VaultKey 服务器同步密码数据</small>
        </div>
        <div class="setting-control">
          <label class="toggle">
            <input type="checkbox" id="sync-enabled">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>

    <!-- 数据管理 -->
    <div class="card">
      <div class="card-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        数据管理
      </div>
      <div class="actions">
        <button id="btn-export" class="btn-secondary">导出数据</button>
        <button id="btn-clear-data" class="btn-danger">清除所有数据</button>
      </div>
    </div>

    <!-- 关于 -->
    <div class="version">
      VaultKey Password Manager v1.0.0<br>
      使用 Chrome Extension Manifest V3 构建
    </div>
  </div>

  <!-- 提示消息 -->
  <div id="toast" class="toast hidden"></div>

  <script src="options.js"></script>
</body>
</html>
